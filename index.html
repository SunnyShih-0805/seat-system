<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>座位選擇系統</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">


<style>

body{

font-family:"Noto Sans TC",sans-serif;

background:#111;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}


.box{

background:#222;

padding:30px;

border-radius:20px;

width:420px;

text-align:center;

}



input{

padding:12px;

font-size:18px;

width:80%;

}



button{

padding:12px 20px;

margin:10px;

font-size:18px;

cursor:pointer;

}




.seats{

display:grid;

grid-template-columns:repeat(8,50px);

gap:10px;

justify-content:center;

margin-top:20px;

}



.seat{

width:50px;

height:50px;

background:#eee;

color:black;

border-radius:8px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

}



.locked{

background:#555;

color:white;

cursor:not-allowed;

}


.my{

background:#4caf50;

}


.hidden{

display:none;

}


</style>

</head>



<body>



<div class="box" id="login">


<h1>座位系統</h1>


<input id="seatNo"
placeholder="輸入座號">


<br>


<button onclick="login()">
登入
</button>


</div>





<div class="box hidden" id="main">


<h2 id="welcome"></h2>


<h3 id="status"></h3>


<div class="seats" id="seats"></div>



</div>





<script>


const API=
"https://script.google.com/macros/s/AKfycbwYo6oOn96gzSzbxjnM--wu25wsLSiXWs7ffQ76y3PDW6ZR2vlevRy4j9EfRNVOZqxCiw/exec";



let mySeatNo;



async function login(){


mySeatNo=
document.getElementById("seatNo").value;



let res=
await fetch(
API+
"?action=login&seatNo="+mySeatNo
);



let data=
await res.json();



if(!data.success){

alert("查無資料");

return;

}



document
.getElementById("login")
.classList.add("hidden");


document
.getElementById("main")
.classList.remove("hidden");



document
.getElementById("welcome")
.innerHTML=
data.name;



loadSeats();


}





async function loadSeats(){


let res=
await fetch(
API+
"?action=seatmap"
);


let data=
await res.json();



let area=
document.getElementById("seats");


area.innerHTML="";



for(let i=1;i<data.seats.length;i++){


let seat=
data.seats[i];



let div=
document.createElement("div");


div.className="seat";

div.innerHTML=
seat[0];



if(seat[1]==="Locked"){


div.classList.add("locked");


}



div.onclick=function(){

choose(seat[0]);

}



area.appendChild(div);


}



}




async function choose(id){


let res=
await fetch(

API+
"?action=choose&seatID="
+id+
"&seatNo="
+mySeatNo

);



let data=
await res.json();



if(data.success){

alert("選位成功");

loadSeats();


}else{

alert(data.message);

}


}



</script>


</body>

</html>
