<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>座位選擇系統</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">


<style>

body{

font-family:"Noto Sans TC",sans-serif;

background:#111;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}


.box{

background:#222;

padding:30px;

border-radius:20px;

width:420px;

text-align:center;

}



input{

padding:12px;

font-size:18px;

width:80%;

}



button{

padding:12px 20px;

margin:10px;

font-size:18px;

cursor:pointer;

}




.seats{

display:grid;

grid-template-columns:repeat(8,50px);

gap:10px;

justify-content:center;

margin-top:20px;

}



.seat{

width:50px;

height:50px;

background:#eee;

color:black;

border-radius:8px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

}



.locked{

background:#555;

color:white;

cursor:not-allowed;

}


.my{

background:#4caf50;

}


.hidden{

display:none;

}


</style>

</head>



<body>



<div class="box" id="login">


<h1>座位系統</h1>


<input id="seatNo"
placeholder="輸入座號">


<br>


<button onclick="login()">
登入
</button>


</div>


<div class="box hidden" id="admin">

<h2>管理員模式</h2>

<div id="adminInfo"></div>

<button onclick="refreshAdmin()">
重新整理
</button>

<button onclick="resetAll()">
重置系統
</button>

</div>


<div class="box hidden" id="main">


<h2 id="welcome"></h2>


<h3 id="status"></h3>


<div class="seats" id="seats"></div>



</div>





<script>

const params =
new URLSearchParams(
  window.location.search
);

const isTeacher =
params.get("id")==="teacher";

let myRank = null;
let polling = null;

const API=
"https://script.google.com/macros/s/AKfycbwYo6oOn96gzSzbxjnM--wu25wsLSiXWs7ffQ76y3PDW6ZR2vlevRy4j9EfRNVOZqxCiw/exec";



let mySeatNo;



async function login(){


mySeatNo=
document.getElementById("seatNo").value;



let res=
await fetch(
API+
"?action=login&seatNo="+mySeatNo
);



let data=
await res.json();



if(!data.success){

alert("查無資料");

return;

}



document
.getElementById("login")
.classList.add("hidden");


document
.getElementById("main")
.classList.remove("hidden");



document
.getElementById("welcome")
.innerHTML=
data.name;

if(data.rank){

  myRank = Number(data.rank);

  waitForTurn();

}else{

  askRank();

}


}





async function loadSeats(){


let res=
await fetch(
API+
"?action=seatmap"
);


let data=
await res.json();



let area=
document.getElementById("seats");


area.innerHTML="";



for(let i=1;i<data.seats.length;i++){


let seat=
data.seats[i];



let div=
document.createElement("div");


div.className="seat";

div.innerHTML=
seat[0];



if(seat[1]==="Locked"){


div.classList.add("locked");


}



div.onclick=function(){

choose(seat[0]);

}



area.appendChild(div);


}



}




async function choose(id){


let res=
await fetch(

API+
"?action=choose&seatID="
+id+
"&seatNo="
+mySeatNo

);



let data=
await res.json();



if(data.success){

alert("選位成功");

loadSeats();


}else{

alert(data.message);

}


}

async function askRank(){

  let rank =
  prompt("請輸入你的名次");

  if(!rank){
    return;
  }

  let res =
  await fetch(
    API+
    "?action=setRank"+
    "&seatNo="+mySeatNo+
    "&rank="+rank
  );

  let data =
  await res.json();

  if(data.success){

    myRank = Number(rank);

    waitForTurn();

  }

}

async function waitForTurn(){

  document
  .getElementById("status")
  .innerHTML =
  "等待叫號中";

  checkTurn();

  polling =
  setInterval(
    checkTurn,
    5000
  );

}

async function checkTurn(){

  let res =
  await fetch(
    API+
    "?action=currentRank"
  );

  let data =
  await res.json();

  document
  .getElementById("status")
  .innerHTML =
  "目前輪到第 "
  +data.currentRank+
  " 名";

  if(
    Number(data.currentRank)
    ===
    Number(myRank)
  ){

    clearInterval(polling);

    document
    .getElementById("status")
    .innerHTML =
    "輪到你選位了";

    loadSeats();

  }

}

window.onload=function(){

  if(isTeacher){

    document
    .getElementById("admin")
    .classList.remove("hidden");

    refreshAdmin();

  }

}

</script>


</body>

</html>
