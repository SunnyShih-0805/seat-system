<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>座位選擇系統</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">


<style>

body{

font-family:"Noto Sans TC",sans-serif;

background:#111;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}


.box{

background:#222;

padding:30px;

border-radius:20px;

width:420px;

text-align:center;

}



input{

padding:12px;

font-size:18px;

width:80%;

}



button{

padding:12px 20px;

margin:10px;

font-size:18px;

cursor:pointer;

}




.stage{

font-size:22px;

font-weight:700;

margin-bottom:25px;

}

.row{

display:flex;

justify-content:center;

gap:10px;

margin-bottom:10px;

}

.bottom{

margin-top:25px;

}



.seat{

width:50px;

height:50px;

background:#eee;

color:black;

border-radius:8px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

}



.locked{

background:#555;

color:white;

cursor:not-allowed;

}


.my{

background:#4caf50;

}


.hidden{

display:none;

}


</style>

</head>



<body>



<div class="box" id="login">


<h1>座位系統</h1>


<input id="seatNo"
placeholder="輸入座號">


<br>


<button onclick="login()">
登入
</button>


</div>


<div class="box hidden" id="admin">

<h2>管理員模式</h2>

<div id="adminInfo"></div>

<button onclick="refreshAdmin()">
重新整理
</button>

<button onclick="resetAll()">
重置系統

<button onclick="prevRank()">上一名</button>

<button onclick="nextRank()">下一名</button>

</button>

</div>


<div class="box hidden" id="main">


<h2 id="welcome"></h2>


<h3 id="status"></h3>


<div class="stage">
講台
</div>

<div id="seats"></div>



</div>





<script>

const params =
new URLSearchParams(
  window.location.search
);

const isTeacher =
params.get("id")==="teacher";

let myRank = null;
let polling = null;

const API=
"https://script.google.com/macros/s/AKfycbwYo6oOn96gzSzbxjnM--wu25wsLSiXWs7ffQ76y3PDW6ZR2vlevRy4j9EfRNVOZqxCiw/exec";



let mySeatNo;



async function login(){


mySeatNo=
document.getElementById("seatNo").value;



let res=
await fetch(
API+
"?action=login&seatNo="+mySeatNo
);



let data=
await res.json();



if(!data.success){

alert("查無資料");

return;

}



document
.getElementById("login")
.classList.add("hidden");


document
.getElementById("main")
.classList.remove("hidden");



document
.getElementById("welcome")
.innerHTML=
data.name;

if(data.rank){

  myRank = Number(data.rank);

  waitForTurn();

}else{

  askRank();

}


}





async function loadSeats(){


let res=
await fetch(
API+
"?action=seatmap"
);


let data=
await res.json();



let area=
document.getElementById("seats");


area.innerHTML="";



for(let i=1;i<data.seats.length;i++){


let seat=
data.seats[i];



let div=
document.createElement("div");


div.className="seat";

div.innerHTML=
seat[0];



if(seat[1]==="Locked"){


div.classList.add("locked");


}



div.onclick=function(){

choose(seat[0]);

}



const layout = [
["A1","B1","C1","D1","E1","F1","G1","H1"],
["A2","B2","C2","D2","E2","F2","G2","H2"],
["A3","B3","C3","D3","E3","F3","G3","H3"],
["A4","B4","C4","D4","E4","F4","G4","H4"],
["A5","B5","C5","D5","E5","F5","G5","H5"],
["","","C6","D6","E6","F6","",""]
];
let row=document.createElement("div");
row.className="row";
let blank=document.createElement("div");

blank.style.width="50px";

blank.style.height="50px";

row.appendChild(blank);
area.appendChild(row);

}



}


async function prevRank(){

  const res =
    await fetch(API+"?action=dashboard");

  const data =
    await res.json();

  await fetch(
    API+
    "?action=setCurrentRank&rank="+
    Math.max(1,data.currentRank-1)
  );

  refreshAdmin();

}

async function choose(id){


let res=
await fetch(

API+
"?action=choose&seatID="
+id+
"&seatNo="
+mySeatNo

);



let data=
await res.json();



if(data.success){

alert("選位成功");

loadSeats();


}else{

alert(data.message);

}


}

async function askRank(){

  let rank =
  prompt("請輸入你的名次");

  if(!rank){
    return;
  }

  let res =
  await fetch(
    API+
    "?action=setRank"+
    "&seatNo="+mySeatNo+
    "&rank="+rank
  );

  let data =
  await res.json();

  if(data.success){

    myRank = Number(rank);

    waitForTurn();

  }

}

async function waitForTurn(){

  document
  .getElementById("status")
  .innerHTML =
  "等待叫號中";

  checkTurn();

  polling =
  setInterval(
    checkTurn,
    5000
  );

}

async function checkTurn(){

  let res =
  await fetch(
    API+
    "?action=currentRank"
  );

  let data =
  await res.json();

  document
  .getElementById("status")
  .innerHTML =
  "目前輪到第 "
  +data.currentRank+
  " 名";

  if(
    Number(data.currentRank)
    ===
    Number(myRank)
  ){

    clearInterval(polling);

    document
    .getElementById("status")
    .innerHTML =
    "輪到你選位了";

    loadSeats();

  }

}

async function refreshAdmin(){

  const res =
    await fetch(API+"?action=dashboard");

  const data =
    await res.json();

  let html="";

  html+="<h3>目前輪到："+data.currentRank+"名</h3>";

  html+="<table border='1' style='width:100%;border-collapse:collapse;'>";

  html+="<tr>";
  html+="<th>姓名</th>";
  html+="<th>名次</th>";
  html+="<th>完成</th>";
  html+="</tr>";

  for(let i=1;i<data.students.length;i++){

    html+="<tr>";

    html+="<td>"+data.students[i][1]+"</td>";

    html+="<td>"+data.students[i][2]+"</td>";

    html+="<td>"+(data.students[i][3]?"✓":"")+"</td>";

    html+="</tr>";

  }

  html+="</table>";

  document.getElementById("adminInfo").innerHTML=html;

}

  document
  .getElementById("adminInfo")
  .innerHTML=
  html;

}

async function resetAll(){

  if(!confirm("確定重置？")){
    return;
  }

  await fetch(
    API+
    "?action=reset"
  );

  alert("完成");

  refreshAdmin();

}
  
window.onload=function(){

  if(isTeacher){

    document
    .getElementById("admin")
    .classList.remove("hidden");

    refreshAdmin();

  }

}

</script>


</body>

</html>
